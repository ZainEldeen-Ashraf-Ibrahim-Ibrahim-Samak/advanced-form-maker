name: scct_mobile_shell
description: SCCT QR webview companion app (Flutter)
publish_to: none
version: 0.1.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  webview_flutter: ^4.10.0
  mobile_scanner: ^5.2.2
  image_picker: ^1.2.0
  file_picker: ^10.3.2
  desktop_drop: ^0.7.0
  flutter_image_compress: ^2.4.0
  path_provider: ^2.1.5
  flutter_secure_storage: ^9.2.4
  shared_preferences: ^2.5.3
  connectivity_plus: ^6.1.5
  uuid: ^4.5.1
  http: ^1.5.0
  cryptography: ^2.7.0
  pusher_channels_flutter: ^2.2.0
  flutter_dotenv: ^6.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_native_splash: ^2.4.6
  rename: ^3.1.0
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: true
  ios: true
  remove_alpha_ios: true
  image_path: "assets/app_icon.png"
  adaptive_icon_background: "#0F172A"
  adaptive_icon_foreground: "assets/app_icon.png"

flutter_native_splash:
  color: "#0F172A"
  color_dark: "#0F172A"
  image: assets/app_icon.png
  image_dark: assets/app_icon.png
  android_12:
    color: "#0F172A"
    color_dark: "#0F172A"
    image: assets/app_icon.png
    image_dark: assets/app_icon.png

flutter:
  uses-material-design: true
  assets:
    - assets/app_icon.png
    - assets/i18n/en.json
    - assets/i18n/ar.json
    - assets/favicon.ico
    - .env
